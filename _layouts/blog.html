<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ page.title }} | Sheldon J Smith</title>
    <meta name="generator" content="Jekyll v3.9.0">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:locale" content="en_US">
    <link rel="canonical" href="https://screemm.github.io/">
    <meta property="og:url" content="https://screemm.github.io/">

{"description":"","url":"https://screemm.github.io/","@type":"WebSite","headline":"{{ page.title }}","name":"Sheldon J Smith","@context":"https://schema.org"}</script>

    <style>
        body {
            background-color: #212529;
        }
    </style>
</head>

<body>
    <header>
        <div class="container-fluid">
            <div class="container">
                <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="https://sheldonjsmith.com/">Sheldon J Smith</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                                <li class="nav-item">
                                    <a class="nav-link" href="https://sheldonjsmith.com/">Home</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="https://sheldonjsmith.com/#about-me">About Me</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link active" aria-current="page" href="#">Blog</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="https://sheldonjsmith.com/#projects">Projects</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>
    <section id="main-content">
        <div class="container-fluid">
            <div class="container">
                {% for post in site.posts %}
                    <div class="blog-item">
                        <div class="blog-header">{{ post.title }}</div>
                        <div class="blog-body">{{ post.excerpt }}</div>
                        <div class="blog-footer">Created by {{ post.author }} {{ post.date }}</div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
                
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
</body>
