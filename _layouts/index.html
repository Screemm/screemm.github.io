{%- include head.html -%}
{%- include index-style.html -%}
<body>
    <div id="bg-overlay"></div>
    <div class="container-fluid h-100" id="main">
        <div class="row row-cols-1 g-4 h-100">
            <div class="col h-100 align-middle">
                {%- include index-header.html -%}
            </div>
            {% for post in site.posts %}
                {% if post.tags contains "index" %}
                    <div class="col h-100" id="{{ post.quote }}">
                        <h2 class="text-center">{{ post.title }}</h2>
                        <span class="text-center">{{ post.excerpt }}</span>
                    </div>
                {% else %}
            
                {% endif %}
            {% endfor %}
        </div>
    </div>
    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
</body>
