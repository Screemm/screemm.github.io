<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/assets/css/style.css?v=37ea8f64f8ad77c57f23ad4a82bbde525a5a3e73">
    <link rel="stylesheet" href="https://sreemm.github.io/default.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Begin Jekyll SEO tag v2.7.1 -->
    <title>{{ page.title }} | Sheldon's Blog</title>
    <meta name="generator" content="Jekyll v3.9.0">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:locale" content="en_US">
    <link rel="canonical" href="https://screemm.github.io/">
    <meta property="og:url" content="https://screemm.github.io/">
    <meta property="og:site_name" content="Sheldon's Blog">
    <meta name="twitter:card" content="summary">
    <meta property="twitter:title" content="">
    <script type="application/ld+json">
{"description":"","url":"https://screemm.github.io/","@type":"WebSite","headline":"{{ page.title }}","name":"Sheldon's Blog","@context":"https://schema.org"}</script>
    <!-- End Jekyll SEO tag -->
</head>
<body>
    <header>
        <div class="container">
            <a id="a-title" style="text-decoration:none;" href="https://screemm.github.io/">
                <h1>Sheldon's Blog</h1>
            </a>
        </div>
    </header>
    <div class="container">
        <section id="main_content">
            {{ content }}

            {% for post in site.posts %}
                <div class="posts-summary">
                    <a href="{{ post.url }}"><h2>{{ post.title }}</h2></a>
                    <p>{{ post.excerpt }}</p>
                </div>
            {% endfor %}
        </section>
    </div>
    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
