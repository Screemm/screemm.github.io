<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Begin Jekyll SEO tag v2.7.1 -->
    <title>{{ page.title }} | Sheldon's Blog</title>
    <meta name="generator" content="Jekyll v3.9.0">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:locale" content="en_US">
    <meta name="description" content="">
    <meta property="og:description" content="">
    <link rel="canonical" href="https://screemm.github.io/">

    <meta property="twitter:title" content="">

{"description":"","url":"https://screemm.github.io/","@type":"WebSite","headline":"{{ page.title }}","name":"Sheldon's Blog","@context":"https://schema.org"}</script>

</head>
<body>
    <header>
        <div class="container">
            <a id="a-title" href="https://screemm.github.io/">
                <h1>Sheldon's Blog</h1>
            </a>
            <h2>Description here...</h2>
        </div>
    </header>
    <div class="container">
        <section id="main_content">
            <nav class="navbar navbar-dark">
                <div class="container-fluid">
                    {% for page in site.pages %}
                        <li class="nav-item">
                            <a class="nav-link" href={{ page.filename }}>{{ page.title }}</a>
                        </li>
                    {% endfor %}
                </div>
            </nav>
            {{ content }}
        </section>
    </div>
    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
